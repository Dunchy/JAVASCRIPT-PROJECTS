<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />
    <script src="JS/main.js"></script>
    <title>Comparisons Type Coercion</title>
</head>

<body>
    <!--When these buttons are pressed they call the corresponding function in the javascript file, 
    which change the data held within each paragraph element-->>
    <div>
        <button onclick="ShowIfNan()">Is it NaN?</button>
        <p id="nan"></p>
        <p id="true"></p>
        <p id="false"></p>
        <p id="infinity"></p>
        <p id="notinfinity"></p>
        <p id="booltrue"></p>
        <p id="boolfalse"></p>
    </div>
    <div>
        <br>
        <button onclick="Compare()">True or False</button>
        <p id="p1"></p>
        <p id="p2"></p>
        <p id="p3"></p>
        <p id="p4"></p>
        <p id="p5"></p>
        <p id="p6"></p>
        <p id="p7"></p>
        <p id="p8"></p>

    </div>
    <div>
        <br>
        <button onclick="ShowType()">Press for type</button>
    </div>
</body>

</html>
